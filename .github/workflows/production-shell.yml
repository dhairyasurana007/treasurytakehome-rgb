name: Production Shell

on:
  workflow_dispatch:
    inputs:
      application_url:
        description: Deployed application URL
        required: true
        default: https://ttb-label-verifier-rgb.onrender.com
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  shell:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.application_url || 'https://ttb-label-verifier-rgb.onrender.com' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Wait for Render to finish deploying
        run: |
          for i in $(seq 1 20); do
            curl --silent --fail "$PLAYWRIGHT_BASE_URL/api/health" && echo "healthy" && break
            echo "attempt $i — retrying in 15s"
            sleep 15
          done

      - name: Shell — health endpoint and app navigation
        run: npx playwright test e2e/smoke.spec.ts --project=chromium

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: production-shell-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
