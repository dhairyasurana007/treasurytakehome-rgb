name: Production Smoke

on:
  workflow_dispatch:
    inputs:
      application_url:
        description: Deployed application URL
        required: true
        default: https://ttb-label-verifier-rgb.onrender.com

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Verify health and public workflow shell
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.application_url }}
        run: |
          curl --fail --retry 5 --retry-delay 10 "$PLAYWRIGHT_BASE_URL/api/health"
          npx playwright test e2e/smoke.spec.ts --project=chromium
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: production-smoke-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
